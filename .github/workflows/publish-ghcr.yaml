name: Publish to GHCR

# Reusable. Per-arch native runner builds bread + bread-chisel-releases
# images normally (no qemu, docker driver, loaded into local daemon) and
# `docker save`s each to a docker-archive tarball. Tarballs upload as
# artefacts. A single stitch job downloads both arches' tarballs, builds
# a multiarch manifest list per (flavour, ver) via buildah, and pushes
# each to ghcr.io/<repo>/{bread,bread-chisel-releases}:<ver>.
#
# bread-test is intentionally not published (test-infra-only).

on:
  workflow_call:

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore cached binaries + stamp
        uses: actions/download-artifact@v6
        with:
          name: binaries-cache
          path: .

      - name: Build bread + bread-chisel-releases images for ${{ matrix.arch }}
        run: make build-bread build-bread-chisel-releases ARCH=${{ matrix.arch }}

      - name: Save images as docker-archive tarballs
        run: |
          set -e
          mkdir -p images-out
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              tag="$flavour:$ver-${{ matrix.arch }}"
              echo "==> saving $tag"
              docker save "$tag" -o "images-out/$flavour-$ver-${{ matrix.arch }}.tar"
            done
          done

      - name: Upload ${{ matrix.arch }} image tarballs
        uses: actions/upload-artifact@v6
        with:
          name: images-${{ matrix.arch }}
          path: images-out/

  stitch-and-push:
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download amd64 image tarballs
        uses: actions/download-artifact@v6
        with:
          name: images-amd64
          path: amd64

      - name: Download arm64 image tarballs
        uses: actions/download-artifact@v6
        with:
          name: images-arm64
          path: arm64

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
              buildah login --username "${{ github.actor }}" \
                  --password-stdin "$REGISTRY"

      - name: Stitch + push multiarch manifests
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              m="$flavour-$ver-manifest"
              buildah manifest create "$m"
              buildah manifest add --arch amd64 "$m" \
                "docker-archive:amd64/$flavour-$ver-amd64.tar"
              buildah manifest add --arch arm64 "$m" \
                "docker-archive:arm64/$flavour-$ver-arm64.tar"
              buildah manifest push --format oci --all "$m" \
                "docker://$REGISTRY/${{ github.repository }}/$flavour:$ver"
              buildah manifest rm "$m"
            done
          done
