name: Build and Test

# Reusable. Per-arch native runner builds all bread / bread-chisel-releases /
# bread-test images for its arch (no qemu, no cross-arch matrix entry per
# runner) and then runs spread-in-spread tests scoped to the same arch.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore cached binaries + stamp
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: binaries-cache
          path: .

      - name: Build images for ${{ matrix.arch }}
        run: make build-bread build-bread-chisel-releases build-bread-test ARCH=${{ matrix.arch }}

      - name: Install spread (host-side, from cached cross-compiled binary)
        run: |
          sudo install -m 0755 \
            "cache/binaries/spread-${{ matrix.arch }}" \
            /usr/local/bin/spread

      - name: Run spread-in-spread tests (${{ matrix.arch }} outer only)
        working-directory: tests
        run: spread "outer:ubuntu-26.04-${{ matrix.arch }}"
