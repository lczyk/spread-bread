name: Build OCI image tarballs

# Reusable. Per-arch runner builds bread + bread-chisel-releases
# images into the local daemon and `docker save`s each to a
# docker-archive tarball. Tarballs upload as artefacts
# (images-<arch>) so downstream jobs can stitch a multiarch
# manifest or attach to releases without rebuilding.
#
# amd64 / arm64 build on native runners; s390x / ppc64le have no hosted
# runners and build under qemu on amd64 (slow, publish-untested).
#
# bread-test is intentionally not built here (test-infra-only).

on:
  workflow_call:
    inputs:
      # JSON matrix-include list; callers can narrow to a subset of the
      # default (e.g. ci builds only the qemu arches to avoid rebuilding
      # what build-and-test already builds natively).
      matrix:
        type: string
        default: >-
          [{"runner": "ubuntu-24.04",     "arch": "amd64"},
           {"runner": "ubuntu-24.04-arm", "arch": "arm64"},
           {"runner": "ubuntu-24.04",     "arch": "s390x",   "qemu": true},
           {"runner": "ubuntu-24.04",     "arch": "ppc64le", "qemu": true}]

permissions:
  contents: read

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    # NOTE: 90 min covers the qemu lanes; native lanes finish well under 30.
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Restore cached binaries + stamp
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-cache
          path: .

      # Cache the saved tarballs keyed on everything that affects image
      # content (same input set hack/hash_inputs.sh stamps on, incl.
      # .stamp/binaries restored above). Hit -> skip the build entirely;
      # matters most for the slow qemu lanes. Miss -> build and the cache
      # auto-saves at job end.
      - name: Restore image tarball cache
        id: images-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: images-out/
          key: images-${{ matrix.arch }}-${{ hashFiles('images/Dockerfile.*', 'hack/bread-warning.sh', 'hack/banner.txt', 'hack/lazy-apt.sh', 'hack/build_image.sh', '.stamp/binaries') }}

      - name: Set up qemu (emulated arches only)
        if: matrix.qemu && steps.images-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Bake bread + bread-chisel-releases images for ${{ matrix.arch }}
        if: steps.images-cache.outputs.cache-hit != 'true'
        run: make build-bread build-bread-chisel-releases ARCH=${{ matrix.arch }}

      - name: Save images as docker-archive tarballs
        if: steps.images-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p images-out
          for flavour in bread bread-chisel-releases; do
            for ver in 22.04 24.04 25.10 26.04 26.10; do
              tag="$flavour:$ver-${{ matrix.arch }}"
              echo "==> saving $tag"
              docker save "$tag" -o "images-out/$flavour-$ver-${{ matrix.arch }}.tar"
            done
          done

      - name: Upload ${{ matrix.arch }} image tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: images-${{ matrix.arch }}
          path: images-out/
