name: Build OCI image tarballs

# Reusable. Per-arch native runner builds bread + bread-chisel-releases
# images into the local daemon and `docker save`s each to a
# docker-archive tarball. Tarballs upload as artefacts
# (images-amd64, images-arm64) so downstream jobs can stitch a multiarch
# manifest or attach to releases without rebuilding.
#
# bread-test is intentionally not built here (test-infra-only).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore cached binaries + stamp
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-cache
          path: .

      - name: Build bread + bread-chisel-releases images for ${{ matrix.arch }}
        run: make build-bread build-bread-chisel-releases ARCH=${{ matrix.arch }}

      - name: Save images as docker-archive tarballs
        run: |
          set -e
          mkdir -p images-out
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              tag="$flavour:$ver-${{ matrix.arch }}"
              echo "==> saving $tag"
              docker save "$tag" -o "images-out/$flavour-$ver-${{ matrix.arch }}.tar"
            done
          done

      - name: Upload ${{ matrix.arch }} image tarballs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: images-${{ matrix.arch }}
          path: images-out/
