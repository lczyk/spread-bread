name: CI
run-name: CI for ${{ github.ref }}

# Build + test on PR and on push to main. No publishing.
# Rock-only changes are handled by rocks-ci.yaml -- ignore them here.

on:
  pull_request:
    paths-ignore:
      - 'rocks/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'rocks/**'
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a newer one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  binaries:
    uses: ./.github/workflows/binaries.yaml

  build-and-test:
    needs: binaries
    uses: ./.github/workflows/build-and-test.yaml
