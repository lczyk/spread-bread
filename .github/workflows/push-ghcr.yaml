name: Push to GHCR

# Reusable. Downloads per-arch image tarballs produced by build-oci.yaml,
# stitches a multiarch manifest list per (flavour, ver) via buildah, and
# pushes each to ghcr.io/<repo>/{bread,bread-chisel-releases}:<ver>.
#
# Expects images-amd64 + images-arm64 artefacts to already exist (caller
# must have run build-oci.yaml in the same workflow run).

on:
  workflow_call:

env:
  REGISTRY: ghcr.io

jobs:
  stitch-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download amd64 image tarballs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: images-amd64
          path: amd64

      - name: Download arm64 image tarballs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: images-arm64
          path: arm64

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
              buildah login --username "${{ github.actor }}" \
                  --password-stdin "$REGISTRY"

      - name: Stitch multiarch manifests + push for signing
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              m="$flavour-$ver-manifest"
              buildah manifest create "$m"
              buildah manifest add --arch amd64 "$m" \
                "docker-archive:amd64/$flavour-$ver-amd64.tar"
              buildah manifest add --arch arm64 "$m" \
                "docker-archive:arm64/$flavour-$ver-arm64.tar"
              buildah manifest push --format oci --all "$m" \
                "docker://$REGISTRY/${{ github.repository }}/$flavour:$ver"
            done
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
              cosign login --username "${{ github.actor }}" \
                  --password-stdin "$REGISTRY"

      - name: Sign each multiarch manifest (keyless OIDC)
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              cosign sign --yes \
                "$REGISTRY/${{ github.repository }}/$flavour:$ver"
            done
          done

      - name: Re-push version tags (so they land after cosign sig tags in registry)
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 24.04 25.10 26.04; do
              m="$flavour-$ver-manifest"
              buildah manifest push --format oci --all "$m" \
                "docker://$REGISTRY/${{ github.repository }}/$flavour:$ver"
              buildah manifest rm "$m"
            done
          done
