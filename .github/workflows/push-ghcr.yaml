name: Push to GHCR

# Reusable. Downloads per-arch image tarballs produced by build-oci.yaml,
# stitches a multiarch manifest list per (flavour, ver) via buildah, and
# pushes each to ghcr.io/<repo>/{bread,bread-chisel-releases}:<ver>.
#
# Expects images-<arch> artefacts (one per arch) to already exist (caller
# must have run build-oci.yaml in the same workflow run).

on:
  workflow_call:

env:
  REGISTRY: ghcr.io

jobs:
  stitch-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Each images-<arch> artefact lands in its own <arch>/ dir.
      - name: Download per-arch image tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: images-*
          merge-multiple: false

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
              buildah login --username "${{ github.actor }}" \
                  --password-stdin "$REGISTRY"

      - name: Stitch multiarch manifests + push
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 22.04 24.04 25.10 26.04 26.10; do
              m="$flavour-$ver-manifest"
              buildah manifest create "$m"
              for arch in amd64 arm64 s390x ppc64le; do
                buildah manifest add --arch "$arch" "$m" \
                  "docker-archive:images-$arch/$flavour-$ver-$arch.tar"
              done
              buildah manifest push --format oci --all "$m" \
                "docker://$REGISTRY/${{ github.repository }}/$flavour:$ver"
              buildah manifest rm "$m"
            done
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
              cosign login --username "${{ github.actor }}" \
                  --password-stdin "$REGISTRY"

      - name: Sign each multiarch manifest (keyless OIDC)
        run: |
          set -e
          for flavour in bread bread-chisel-releases; do
            for ver in 22.04 24.04 25.10 26.04 26.10; do
              cosign sign --yes \
                "$REGISTRY/${{ github.repository }}/$flavour:$ver"
            done
          done

