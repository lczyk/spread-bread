name: Binaries

# Reusable. Cross-compiles chisel + spread (via Canonical's
# ubuntu/go:1.25-26.04_edge builder) and fetches the upstream docker
# static CLI for both arches. Uploads cache/binaries/ + the matching
# .stamp/binaries so downstream jobs can short-circuit any rebuild.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Cache the cross-compiled binaries between runs, keyed on every
      # input that affects the build: the build script + the makefile
      # (which holds the version pins CHISEL_REF / SPREAD_REF /
      # DOCKER_VERSION / GO_BUILDER_IMAGE). Hit -> skip the make step.
      # Miss -> make rebuilds and the cache auto-saves at job end.
      - name: Restore binaries cache
        id: binaries-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            cache/binaries/
            .stamp/binaries
          key: binaries-${{ hashFiles('hack/build_binaries.sh', 'makefile') }}

      - name: Build go binaries (chisel + spread + docker static)
        if: steps.binaries-cache.outputs.cache-hit != 'true'
        run: make .stamp/binaries

      - name: Upload cache/binaries + .stamp/binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-cache
          path: |
            cache/binaries/
            .stamp/binaries
