summary: bread-chisel-releases image contract (bread checks + chisel + tools)

execute: |
  set -e

  expected_ver=$(echo "$SPREAD_SYSTEM" | cut -d- -f2)
  expected_arch=$(echo "$SPREAD_SYSTEM" | cut -d- -f3)

  actual_ver=$(. /etc/os-release && echo "$VERSION_ID")
  if [ "$expected_ver" != "$actual_ver" ]; then
      echo "ver mismatch: expected=$expected_ver got=$actual_ver"
      exit 1
  fi

  case "$(uname -m)" in
      x86_64)  actual_arch=amd64 ;;
      aarch64) actual_arch=arm64 ;;
      *)       actual_arch=$(uname -m) ;;
  esac
  if [ "$expected_arch" != "$actual_arch" ]; then
      echo "arch mismatch: expected=$expected_arch got=$actual_arch"
      exit 1
  fi

  # chisel pinned to v1.4.1 by the chisel-releases-bread Dockerfile.
  chisel --version | grep -q "v1\.4\.1" || {
      echo "chisel binary missing or wrong version"
      chisel --version || true
      exit 1
  }

  # chisel-hacked: same base version, -hacked suffix in version string.
  chisel-hacked --version | grep -q "v1\.4\.1-hacked" || {
      echo "chisel-hacked binary missing or wrong version"
      chisel-hacked --version || true
      exit 1
  }

  for cmd in curl wget git jq file sudo tree docker skopeo; do
      command -v "$cmd" >/dev/null || {
          echo "missing command: $cmd"
          exit 1
      }
  done

  # bread-warning: file present + prints exactly once on a forced login shell.
  test -r /etc/profile.d/00-bread-warning.sh || {
      echo "missing /etc/profile.d/00-bread-warning.sh"
      exit 1
  }
  grep -q "bread-warning" /root/.bashrc || {
      echo "/root/.bashrc missing bread-warning hook"
      exit 1
  }
  out=$(BREAD_BANNER_FORCE=1 bash -l -c true 2>&1)
  count=$(echo "$out" | grep -c "INSECURE TEST IMAGE" || true)
  if [ "$count" != "1" ]; then
      echo "banner print count: expected=1 got=$count"
      echo "---"
      echo "$out"
      echo "---"
      exit 1
  fi
  silent=$(bash -l -c true 2>&1)
  if echo "$silent" | grep -q "INSECURE TEST IMAGE"; then
      echo "banner leaked on non-tty"
      exit 1
  fi

  echo "ok: $SPREAD_SYSTEM"
