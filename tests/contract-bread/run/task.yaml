summary: run inner spread against an inlined bread yaml

variants:
  - v24_04
  - v25_10
  - v26_04

execute: |
  set -e

  work=$(mktemp -d)
  trap "rm -rf $work" EXIT

  # Lay out a minimal project dir for inner spread:
  #   $work/spread.yaml = the inlined yaml under test
  #   $work/tests/contract/task.yaml = the inner contract task
  cp "$INLINED" "$work/spread.yaml"
  cp -r "$REPO/tests/_inner-bread/." "$work/tests"

  # Inlined yaml references ghcr multiarch path (consumer form).
  # For tests we want locally-built arch-suffixed images, not a ghcr
  # pull. Rewrite the image line back to bare local form.
  sed -i 's#ghcr\.io/lczyk/spread-bread/\([a-z-]*\):\$ver#\1:$ver-$arch#g' "$work/spread.yaml"

  cd "$work"

  # Inlined yaml lists both arches; filter inner spread to the outer's
  # arch so per-arch ci jobs (which build only one arch's images) don't
  # try to spawn the missing-arch inner container.
  outer_arch=$(echo "$SPREAD_SYSTEM" | cut -d- -f3)
  spread -v "docker:ubuntu-...-${outer_arch}:..."
